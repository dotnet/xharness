variables:
- template: /eng/common-variables.yml
- template: /eng/common/templates/variables/pool-providers.yml

# CI and PR triggers
trigger:
  batch: true
  branches:
    include:
    - main
    - release/*

pr:
  branches:
    include:
    - main
    - release/*

# Build

stages:
- stage: Build_Windows_NT
  displayName: Build Windows
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      enableTelemetry: true
      enablePublishBuildArtifacts: true
      enableMicrobuild: true
      publishingVersion: 4
      enablePublishBuildAssets: true
      helixRepo: dotnet/xharness

      jobs:
      - job: Windows_NT
        enablePublishing: true
        pool:
            name: $(DncEngPublicBuildPool)
            demands: ImageOverride -equals 1es-windows-2022-open
        strategy:
          matrix:
            Release:
              _BuildConfig: Release
              _PublishArgs: ''
            Debug:
              _BuildConfig: Debug
              _PublishArgs: /p:Publish=false
        steps:
        - script: eng\common\CIBuild.cmd
            -configuration $(_BuildConfig)
            -prepareMachine
            $(_PublishArgs)
          name: Build
          displayName: Build and run tests
          condition: succeeded()

        - task: PublishTestResults@2
          displayName: 'Publish Unit Test Results'
          inputs:
            testResultsFormat: xUnit
            testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/**/*.xml'
            mergeTestResults: true
            searchFolder: $(system.defaultworkingdirectory)
            testRunTitle: XHarness unit tests - $(Agent.JobName)
          condition: succeededOrFailed()

- stage: Build_OSX
  displayName: Build OSX
  dependsOn:
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      enableTelemetry: true
      enablePublishBuildArtifacts: true
      enableMicrobuild: true
      publishingVersion: 4
      enablePublishBuildAssets: true
      helixRepo: dotnet/xharness

      jobs:
      - job: OSX
        enablePublishing: true
        pool:
          vmImage: macOS-15
        strategy:
          matrix:
            Release:
              _BuildConfig: Release
              _PublishArgs: ''
            Debug:
              _BuildConfig: Debug
              _PublishArgs: /p:Publish=false
        steps:
        - script: eng/common/cibuild.sh
            --configuration $(_BuildConfig)
            --prepareMachine
            $(_PublishArgs)
          name: Build
          displayName: Build and run tests
          condition: succeeded()

        - publish: $(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)/Shipping/Microsoft.DotNet.XHarness.CLI.11.0.0-ci.nupkg
          artifact: Microsoft.DotNet.XHarness.CLI.$(_BuildConfig)
          displayName: Publish XHarness CLI for Helix Testing
          condition: and(succeeded(), eq(variables['_BuildConfig'], 'Debug'))

        - task: PublishTestResults@2
          displayName: 'Publish Unit Test Results'
          inputs:
            testResultsFormat: xUnit
            testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/**/*.xml'
            mergeTestResults: true
            searchFolder: $(system.defaultworkingdirectory)
            testRunTitle: XHarness unit tests - $(Agent.JobName)
          condition: succeededOrFailed()

- stage: Build_AOT_OSX
  displayName: Build OSX NativeAOT (xharness)
  dependsOn:
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      enableTelemetry: true
      enablePublishBuildArtifacts: false
      helixRepo: dotnet/xharness

      jobs:
      - job: OSX_AOT_arm64
        displayName: Publish xharness (NativeAOT, osx-arm64)
        pool:
          vmImage: macOS-15
        timeoutInMinutes: 60
        steps:
        - script: ./build.sh --restore
          displayName: Restore .NET SDK and packages
          condition: succeeded()

        - script: ./.dotnet/dotnet publish
            src/Microsoft.DotNet.XHarness.CLI/Microsoft.DotNet.XHarness.CLI.csproj
            -c Release
            -r osx-arm64
            -p:XHarnessNativeAot=true
            /bl:$(Build.SourcesDirectory)/artifacts/log/Release/Publish_AOT_osx-arm64.binlog
          displayName: dotnet publish (osx-arm64, NativeAOT)
          condition: succeeded()

        - script: ls -lhR $(Build.SourcesDirectory)/artifacts/bin/Microsoft.DotNet.XHarness.CLI/Release/net*/osx-arm64/publish/
          displayName: List published layout
          condition: succeededOrFailed()

        # The publish directory contains the native binary, adb and the full
        # mlaunch tree under runtimes/any/native/. We upload the whole tree as
        # the pipeline artifact so the e2e stage can pull it down verbatim
        # and ship it as a Helix correlation payload.
        - publish: $(Build.SourcesDirectory)/artifacts/bin/Microsoft.DotNet.XHarness.CLI/Release/net11.0/osx-arm64/publish
          artifact: XHarnessCli_AOT_osx-arm64
          displayName: Publish AOT xharness binary
          condition: succeeded()

# E2E tests

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Android_Simulators
    displayName: Android - Simulators
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Android/Simulator.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Android_Devices
    displayName: Android - Devices
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Android/Device.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Android_Manual_Commands
    displayName: Android - Manual Commands
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Android/Commands.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Apple_Simulators
    displayName: Apple - Simulators
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Simulator.Tests.proj

# NativeAOT pilot: same integration test proj as E2E_Apple_Simulators, but
# the Helix workers run the NativeAOT-published xharness produced by
# Build_AOT_OSX instead of installing the Microsoft.DotNet.XHarness.CLI
# global tool. Other AOT stages will be added once this one is stable.
- template: eng/e2e-aot-test.yml
  parameters:
    name: E2E_Apple_Simulators_AOT
    displayName: Apple - Simulators (NativeAOT)
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Simulator.Tests.proj
    aotPipelineArtifact: XHarnessCli_AOT_osx-arm64

- template: eng/e2e-test.yml
  parameters:
    name: E2E_iOS_Devices
    displayName: Apple - iOS devices
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Device.iOS.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_tvOS_Devices
    displayName: Apple - tvOS devices
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Device.tvOS.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Apple_Simulator_Commands
    displayName: Apple - Simulator Commands
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Simulator.Commands.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Apple_Device_Commands
    displayName: Apple - Device Commands
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/Device.Commands.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_Apple_Simulator_Mgmt
    displayName: Apple - Simulator management
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/Apple/SimulatorInstaller.Tests.proj

- template: eng/e2e-test.yml
  parameters:
    name: E2E_WASM
    displayName: WASM
    testProject: $(Build.SourcesDirectory)/tests/integration-tests/WASM/WASM.Helix.SDK.Tests.proj
