name: Maestro Auto-Merge Finalize

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: maestro-auto-merge-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.repository == 'dotnet/xharness'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      WAIT_HOURS: "4"
    steps:
      - name: Merge eligible candidates
        run: |
          set -euo pipefail

          now=$(date -u +%s)

          gh pr list --repo "$REPO" --label auto-merge-candidate --state open \
            --json number,author,title,mergeable,updatedAt,isDraft,headRefOid \
            --jq '.[] | @base64' |
          while read -r row; do
            json=$(printf '%s' "$row" | base64 --decode)
            number=$(jq -r '.number'       <<<"$json")
            author=$(jq -r '.author.login' <<<"$json")
            title=$(jq  -r '.title'        <<<"$json")
            mergeable=$(jq -r '.mergeable' <<<"$json")
            updated=$(jq -r '.updatedAt'   <<<"$json")
            draft=$(jq  -r '.isDraft'      <<<"$json")
            sha=$(jq    -r '.headRefOid'   <<<"$json")

            echo "::group::PR #$number"

            # Re-verify the reviewer's gates: a Maestro-authored dependency PR
            # that is mergeable and not a draft.
            case "$author" in
              dotnet-maestro|dotnet-maestro\[bot\]) ;;
              *) echo "skip: author=$author is not Maestro"; echo "::endgroup::"; continue;;
            esac
            case "$title" in
              "Update dependencies from"*) ;;
              *) echo "skip: title is not a Maestro update"; echo "::endgroup::"; continue;;
            esac
            if [ "$draft" = "true" ]; then
              echo "skip: draft"; echo "::endgroup::"; continue
            fi
            if [ "$mergeable" != "MERGEABLE" ]; then
              echo "skip: mergeable=$mergeable"; echo "::endgroup::"; continue
            fi

            # Required checks must all be green. A failed lookup, or no required
            # checks at all, is treated as "do not merge" rather than "safe".
            if ! checks=$(gh pr checks "$number" --repo "$REPO" --required --json state 2>/dev/null); then
              echo "skip: could not read required checks"; echo "::endgroup::"; continue
            fi
            total=$(jq 'length' <<<"$checks")
            if [ "$total" -eq 0 ]; then
              echo "skip: no required checks reported"; echo "::endgroup::"; continue
            fi
            failing=$(jq '[.[] | select(.state == "FAILURE" or .state == "CANCELLED")] | length' <<<"$checks")
            pending=$(jq '[.[] | select(.state == "PENDING" or .state == "IN_PROGRESS" or .state == "QUEUED")] | length' <<<"$checks")
            if [ "$failing" -gt 0 ]; then
              echo "skip: $failing required check(s) red, leaving for a human"; echo "::endgroup::"; continue
            fi
            if [ "$pending" -gt 0 ]; then
              echo "skip: $pending required check(s) still running"; echo "::endgroup::"; continue
            fi

            # Enforce the minimum idle age.
            updated_epoch=$(date -u -d "$updated" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$updated" +%s)
            age_hours=$(( (now - updated_epoch) / 3600 ))
            if [ "$age_hours" -lt "$WAIT_HOURS" ]; then
              echo "skip: age ${age_hours}h < ${WAIT_HOURS}h"; echo "::endgroup::"; continue
            fi

            echo "All gates green and idle ${age_hours}h. Merging $sha."
            gh pr merge "$number" --repo "$REPO" --squash --delete-branch --match-head-commit "$sha" \
              || echo "warning: merge failed on #$number (head moved or race), will retry next cycle"
            echo "::endgroup::"
          done
